{% extends "base.html" %}

{% block title %}Sign Up | Fake News Detection{% endblock %}

{% block content %}
<section class="auth-card card reveal">
    <div class="section-heading">
        <h2>Create Account</h2>
        <p>Sign up to save analysis results and access your personal history page.</p>
    </div>

    <form action="{{ url_for('signup') }}" method="POST" class="auth-form">
        <label for="username" class="input-label">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>

        <label for="email" class="input-label">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password" class="input-label">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required>

        <button type="submit" class="primary-button full-width">Sign Up</button>
        <p class="form-footnote">Already registered? <a href="{{ url_for('login') }}">Login here</a>.</p>
    </form>
</section>
{% endblock %}
