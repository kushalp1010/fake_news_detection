{% extends "base.html" %}

{% block title %}Login | Fake News Detection{% endblock %}

{% block content %}
<section class="auth-card card reveal">
    <div class="section-heading">
        <h2>Login</h2>
        <p>Use your username or email to access saved analysis history.</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST" class="auth-form">
        <label for="username_or_email" class="input-label">Username or Email</label>
        <input type="text" id="username_or_email" name="username_or_email" placeholder="Enter username or email" required>

        <label for="password" class="input-label">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>

        <button type="submit" class="primary-button full-width">Login</button>
        <p class="form-footnote">Don't have an account? <a href="{{ url_for('signup') }}">Create one here</a>.</p>
    </form>
</section>
{% endblock %}
